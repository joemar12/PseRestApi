version: '3.9'

services:
  # PseRestApi ASP.NET Core application
  # Uses external database and connection string from Docker secret
  # HTTPS: Self-signed certificate for development (generated by generate-dev-cert.sh)
  pserestapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pse_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080;https://+:8443
      # Kestrel HTTPS Certificate Configuration
      ASPNETCORE_Kestrel__Certificates__Default__Path: /run/secrets/certificate_pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: dev-password
      # Connection string is read from secret file mounted at /run/secrets/db_connection_string
      ConnectionStrings__DefaultConnectionString: /run/secrets/db_connection_string
      PseApiConfig__FramesUrl: "https://frames.pse.com.ph/"
      PseApiConfig__Referer: "https://www1.pse.com.ph/stockMarket/home.html"
      RateLimitConfig__PermitLimit: 10
      RateLimitConfig__WindowInMinutes: 1
    ports:
      - "5000:8080"
      - "5001:8443"
    # volumes:
    #   - ./certs/certificate.pfx:/etc/ssl/certs/certificate.pfx:ro
    secrets:
      - db_connection_string
      - certificate_pfx
    networks:
      - pse_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Optional: Sync service (background worker)
  pserestapi-sync:
    build:
      context: .
      dockerfile: Dockerfile.Sync
    container_name: pse_sync
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Connection string is read from secret file mounted at /run/secrets/db_connection_string
      ConnectionStrings__DefaultConnectionString: /run/secrets/db_connection_string
      PseApiConfig__FramesUrl: "https://frames.pse.com.ph/"
      PseApiConfig__Referer: "https://www1.pse.com.ph/stockMarket/home.html"
    secrets:
      - db_connection_string
    networks:
      - pse_network

  cron:
    image: alpine
    container_name: pse_cron
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "echo '0 0,12 * * * docker exec pse_sync dotnet /app/PseRestApi.Sync.dll' | crontab - && crond -f"
    networks:
      - pse_network

secrets:
  db_connection_string:
    file: ./secrets/db_connection_string.txt
  certificate_pfx:
    file: ./certs/certificate.pfx

networks:
  pse_network:
    driver: bridge
